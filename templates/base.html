<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand text-white" href="{{ url_for('main_dashboard') }}">
            Leader Platform
        </a>

        {% if current_user.is_authenticated %}
        <a class="text-white me-3" href="{{ url_for('main_dashboard') }}">Dashboard</a>
        <a class="text-white me-3" href="{{ url_for('personal_dashboard') }}">Personal</a>
        <a class="text-white me-3" href="{{ url_for('team_dashboard') }}">Team</a>
        <a class="text-white" href="{{ url_for('logout') }}">Logout</a>
        {% else %}
        <a class="text-white me-3" href="{{ url_for('login') }}">Login</a>
        <a class="text-white" href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages() %}
        {% for msg in messages %}
        <div class="alert alert-info">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

</body>

</html>
