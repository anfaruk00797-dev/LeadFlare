{% extends "base.html" %}
{% block title %}Team Dashboard{% endblock %}

{% block content %}
<h2>👥 Your Projects</h2>

<a href="{{ url_for('create_project') }}" class="btn btn-primary mb-3">+ Create Project</a>

{% for project in projects %}
<div class="card mb-2">
    <div class="card-body">
        <h5>
            <a href="{{ url_for('project_detail', id=project.id) }}">
                {{ project.name }}
            </a>
        </h5>
        <p>{{ project.description }}</p>
    </div>
</div>
{% endfor %}
{% endblock %}
