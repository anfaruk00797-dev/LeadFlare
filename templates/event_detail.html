{% extends "base.html" %}
{% block title %}Event Detail{% endblock %}
{% block content %}

<h2>{{ event.title }}</h2>

<p>{{ event.description }}</p>
<p>Date: {{ event.event_date }}</p>

<h4>Preparation Notes</h4>

<form method="POST">
    <textarea class="form-control mb-2" name="preparation_note">
{{ event.preparation_note }}
    </textarea>
    <button class="btn btn-primary">Save Note</button>
</form>

<a href="{{ url_for('edit_event', event_id=event.id) }}" class="btn btn-warning mt-2">Edit</a>
<a href="{{ url_for('delete_event', event_id=event.id) }}" class="btn btn-danger mt-2">Delete</a>

{% endblock %}
